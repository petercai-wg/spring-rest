            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
   
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        enable_lazy_load_no_trans: true ## this to solve lazy loading "cannot initialize proxy - no Session" problem
  graphql:    
    graphiql:
      enabled: true        


springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  override-with-generic-response: false

logging:
  level:
    root: ${LOGGING_LEVEL:info} 
    com.example.springrest: ${APP_LOGGING_LEVEL:debug}
   

management:
  endpoints:
    web:
      exposure:
        include: "*"
  
  endpoint:
    heapdump:
      access:
        unrestricted

      

